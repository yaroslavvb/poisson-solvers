  &lt;script&gt;
    (() =&gt; {
      &quot;use strict&quot;;
      const root = document.getElementById(&quot;incidence-pinv-explorer&quot;);
      const NS = &quot;http://www.w3.org/2000/svg&quot;;
      const $ = (selector) =&gt; root.querySelector(selector);
      const controls = {
        side: $(&quot;#xp-side&quot;), source: $(&quot;#xp-column&quot;), sink: $(&quot;#xp-sink&quot;),
        edge: $(&quot;#xp-row&quot;), pair: $(&quot;#xp-pair&quot;), labels: $(&quot;#xp-labels&quot;),
        voltageMode: $(&quot;#xp-voltage-mode&quot;), steps: $(&quot;#xp-steps&quot;),
        dataMode: $(&quot;#xp-data-mode&quot;)
      };
      const views = {
        matrix: $(&quot;#xp-matrix&quot;), flow: $(&quot;#xp-flow&quot;), voltage: $(&quot;#xp-voltage&quot;)
      };
      const state = {
        side: 5, source: 0, sink: 24, edge: 20, pair: true, labels: true,
        voltageMode: &quot;row&quot;, steps: 8, dataMode: &quot;correction&quot;,
        matrixDragging: false, flowDrag: null, voltageDrag: null, hoverCell: null
      };
      let model = null;

      function svgEl(name, attrs = {}, text = null) {
        const node = document.createElementNS(NS, name);
        for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value);
        if (text !== null) node.textContent = text;
        return node;
      }

      function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
      function zeros(rows, cols) {
        return Array.from({length: rows}, () =&gt; new Float64Array(cols));
      }
      function dot(a, b) {
        let s = 0;
        for (let i = 0; i &lt; a.length; i++) s += a[i] * b[i];
        return s;
      }
      function norm(a) { return Math.sqrt(dot(a, a)); }
      function matVec(A, x) {
        const y = new Float64Array(A.length);
        for (let i = 0; i &lt; A.length; i++) y[i] = dot(A[i], x);
        return y;
      }
      function invert(A) {
        const n = A.length;
        const aug = Array.from({length: n}, (_, i) =&gt; {
          const row = new Float64Array(2 * n);
          row.set(A[i]);
          row[n + i] = 1;
          return row;
        });
        for (let col = 0; col &lt; n; col++) {
          let pivot = col;
          for (let r = col + 1; r &lt; n; r++) {
            if (Math.abs(aug[r][col]) &gt; Math.abs(aug[pivot][col])) pivot = r;
          }
          if (Math.abs(aug[pivot][col]) &lt; 1e-13) throw new Error(&quot;singular matrix&quot;);
          [aug[col], aug[pivot]] = [aug[pivot], aug[col]];
          const scale = aug[col][col];
          for (let j = 0; j &lt; 2 * n; j++) aug[col][j] /= scale;
          for (let r = 0; r &lt; n; r++) {
            if (r === col) continue;
            const factor = aug[r][col];
            if (Math.abs(factor) &lt; 1e-18) continue;
            for (let j = 0; j &lt; 2 * n; j++) aug[r][j] -= factor * aug[col][j];
          }
        }
        return aug.map(row =&gt; Float64Array.from(row.slice(n)));
      }

      function buildGrid(side) {
        const n = side * side;
        const vertices = [];
        for (let r = 0; r &lt; side; r++) {
          for (let c = 0; c &lt; side; c++) vertices.push({i: r * side + c, r, c});
        }
        const edges = [];
        for (let r = 0; r &lt; side; r++) {
          for (let c = 0; c &lt; side - 1; c++) {
            edges.push({i: edges.length, u: r * side + c, v: r * side + c + 1, kind: &quot;H&quot;});
          }
        }
        for (let r = 0; r &lt; side - 1; r++) {
          for (let c = 0; c &lt; side; c++) {
            edges.push({i: edges.length, u: r * side + c, v: (r + 1) * side + c, kind: &quot;V&quot;});
          }
        }
        const L = zeros(n, n);
        for (const e of edges) {
          L[e.u][e.u] += 1; L[e.v][e.v] += 1;
          L[e.u][e.v] -= 1; L[e.v][e.u] -= 1;
        }
        const shifted = zeros(n, n);
        for (let i = 0; i &lt; n; i++) {
          for (let j = 0; j &lt; n; j++) shifted[i][j] = L[i][j] + 1 / n;
        }
        const shiftedInv = invert(shifted);
        const Lp = zeros(n, n);
        for (let i = 0; i &lt; n; i++) {
          for (let j = 0; j &lt; n; j++) Lp[i][j] = shiftedInv[i][j] - 1 / n;
        }
        const X = zeros(edges.length, n);
        for (const e of edges) {
          for (let j = 0; j &lt; n; j++) X[e.i][j] = Lp[e.u][j] - Lp[e.v][j];
        }
        return {side, n, m: edges.length, vertices, edges, L, Lp, X};
      }

      function vertexName(i) {
        const v = model.vertices[i];
        return `v${i} (${v.r + 1},${v.c + 1})`;
      }
      function edgeName(i) {
        const e = model.edges[i];
        return `e${i}: v${e.u} -&gt; v${e.v}`;
      }
      function short(x) {

      function selfTest() {
